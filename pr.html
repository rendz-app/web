<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ประมวลภาพกิจกรรม - อบต.ลาดบัวขาว</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }


        body {
            font-family: 'Noto Sans Thai', sans-serif;
            background-color: #f8fafc;
            color: #334155;
        }


        /* NAV */
        .nav {
            background-color: #1e3a8a;
            padding: 16px 20px;
        }


        .nav .content-wrap {
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            gap: 12px;
        }


        .nav .logo {
            width: 40px;
            height: 40px;
            background-color: white;
            border-radius: 50%;
            object-fit: contain;
        }


        .nav h1 {
            color: white;
            font-size: 16px;
            font-weight: 600;
        }


        /* PAGE HEADER */
        .page-header {
            background: linear-gradient(180deg, #f8fafc 0%, #ffffff 100%);
            padding: 40px 20px 30px;
            text-align: center;
        }


        .page-header h2 {
            font-size: 28px;
            font-weight: 700;
            color: #1e3a8a;
        }


        /* TABS */
        .tabs-section {
            background-color: #ffffff;
            padding: 0 20px 20px;
        }


        .tabs-wrap {
            max-width: 900px;
            margin: 0 auto;
        }


        .tabs {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
        }


        .tab-btn {
            padding: 8px 20px;
            border-radius: 20px;
            border: 1.5px solid #cbd5e1;
            background: white;
            color: #64748b;
            font-family: 'Noto Sans Thai', sans-serif;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }


        .tab-btn:hover {
            border-color: #1e3a8a;
            color: #1e3a8a;
        }


        .tab-btn.active {
            background-color: #1e3a8a;
            border-color: #1e3a8a;
            color: white;
        }


        /* CONTENT */
        .content-section {
            padding: 24px 20px 60px;
        }


        .content-wrap {
            max-width: 900px;
            margin: 0 auto;
        }


        /* CARDS GRID */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }


        /* CARD */
        .card {
            background: white;
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            display: flex;
            flex-direction: column;
        }


        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.12);
        }


        /* CAROUSEL */
        .carousel {
            position: relative;
            width: 100%;
            aspect-ratio: 16/10;
            overflow: hidden;
            background: #e2e8f0;
        }


        .carousel-inner {
            display: flex;
            height: 100%;
            transition: transform 0.4s ease;
        }


        .carousel-inner img {
            min-width: 100%;
            height: 100%;
            object-fit: cover;
            flex-shrink: 0;
        }


        .carousel-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.4);
            color: white;
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
            z-index: 2;
        }


        .carousel-btn:hover { background: rgba(0,0,0,0.65); }
        .carousel-btn.prev { left: 8px; }
        .carousel-btn.next { right: 8px; }
        .carousel-btn.hidden { display: none; }


        .carousel-dots {
            position: absolute;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 6px;
            z-index: 2;
        }


        .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: rgba(255,255,255,0.5);
            cursor: pointer;
            transition: background 0.2s;
        }


        .dot.active { background: white; }


        /* CARD BODY */
        .card-body {
            padding: 14px 16px 16px;
            display: flex;
            flex-direction: column;
            flex: 1;
        }


        .card-title {
            font-size: 14px;
            font-weight: 600;
            color: #1e3a8a;
            line-height: 1.5;
            margin-bottom: 8px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }


        .card-date {
            font-size: 13px;
            color: #94a3b8;
            text-align: right;
            margin-top: auto;
        }


        /* LIGHTBOX */
        .lightbox {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.92);
            z-index: 1000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }


        .lightbox.open { display: flex; }


        .lightbox-close {
            position: absolute;
            top: 16px;
            right: 20px;
            background: none;
            border: none;
            color: white;
            font-size: 32px;
            cursor: pointer;
            line-height: 1;
        }


        .lightbox-carousel {
            position: relative;
            width: 100%;
            max-width: 800px;
            aspect-ratio: 16/10;
        }


        .lightbox-inner {
            display: flex;
            height: 100%;
            transition: transform 0.4s ease;
        }


        .lightbox-inner img {
            min-width: 100%;
            height: 100%;
            object-fit: contain;
            flex-shrink: 0;
        }


        .lightbox-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255,255,255,0.15);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }


        .lightbox-btn:hover { background: rgba(255,255,255,0.3); }
        .lightbox-btn.prev { left: -50px; }
        .lightbox-btn.next { right: -50px; }
        .lightbox-btn.hidden { display: none; }


        .lightbox-dots {
            display: flex;
            gap: 8px;
            margin-top: 14px;
        }


        .lightbox-dots .dot {
            width: 9px;
            height: 9px;
            background: rgba(255,255,255,0.35);
        }


        .lightbox-dots .dot.active { background: white; }


        .lightbox-info {
            max-width: 800px;
            width: 100%;
            margin-top: 16px;
            color: white;
        }


        .lightbox-info .lb-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 6px;
            line-height: 1.5;
        }


        .lightbox-info .lb-date {
            font-size: 13px;
            color: #94a3b8;
            margin-bottom: 8px;
        }


        .lightbox-info .lb-desc {
            font-size: 14px;
            color: #cbd5e1;
            line-height: 1.7;
        }


        @media (max-width: 600px) {
            .lightbox-btn.prev { left: 4px; }
            .lightbox-btn.next { right: 4px; }
            .cards-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>


    <!-- NAV -->
    <nav class="nav">
        <div class="content-wrap">
            <img src="https://placeholder.com/80x80" alt="โลโก้" class="logo">
            <h1>อบต. ลาดบัวขาว</h1>
        </div>
    </nav>


    <!-- PAGE HEADER -->
    <div class="page-header">
        <h2>ประมวลภาพกิจกรรม</h2>
    </div>


    <!-- TABS -->
    <div class="tabs-section">
        <div class="tabs-wrap">
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('meeting', this)">ประชุมหน่วยงาน</button>
                <button class="tab-btn" onclick="switchTab('volunteer', this)">จิตอาสา</button>
                <button class="tab-btn" onclick="switchTab('project', this)">โครงการ</button>
                <button class="tab-btn" onclick="switchTab('activity', this)">กิจกรรม</button>
            </div>
        </div>
    </div>


    <!-- CARDS -->
    <div class="content-section">
        <div class="content-wrap">
            <div class="cards-grid" id="cardsGrid"></div>
        </div>
    </div>


    <!-- LIGHTBOX -->
    <div class="lightbox" id="lightbox">
        <button class="lightbox-close" onclick="closeLightbox()">&times;</button>


        <div class="lightbox-carousel">
            <div class="lightbox-inner" id="lbInner"></div>
            <button class="lightbox-btn prev" id="lbPrev" onclick="lbSlide(-1)">&#8249;</button>
            <button class="lightbox-btn next" id="lbNext" onclick="lbSlide(1)">&#8250;</button>
        </div>
        <div class="lightbox-dots" id="lbDots"></div>


        <div class="lightbox-info">
            <div class="lb-title" id="lbTitle"></div>
            <div class="lb-date" id="lbDate"></div>
            <div class="lb-desc" id="lbDesc"></div>
        </div>
    </div>


    <!-- DATA FILES -->
    <script src="data/meeting.js"></script>
    <script src="data/volunteer.js"></script>
    <script src="data/project.js"></script>
    <script src="data/activity.js"></script>


    <script>
        const dataSources = {
            meeting: () => meetingActivities,
            volunteer: () => volunteerActivities,
            project: () => projectActivities,
            activity: () => generalActivities
        };


        let currentTab = 'meeting';
        let lbImages = [];
        let lbIndex = 0;


        /* ── TABS ── */
        function switchTab(tab, btn) {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderCards();
        }


        /* ── RENDER CARDS ── */
        function renderCards() {
            const grid = document.getElementById('cardsGrid');
            const items = dataSources[currentTab]();
            grid.innerHTML = '';


            items.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';


                const imgs = item.images;
                const dotsHtml = imgs.length <= 1 ? '' : imgs.map((_, i) =>
                    `<span class="dot ${i === 0 ? 'active' : ''}" onclick="event.stopPropagation();cardDot(this,${i})"></span>`
                ).join('');


                const prevHidden = imgs.length <= 1 ? 'hidden' : '';
                const nextHidden = imgs.length <= 1 ? 'hidden' : '';


                const imgsHtml = imgs.map(src => `<img src="${src}" alt="${item.title}">`).join('');


                card.innerHTML = `
                    <div class="carousel" data-index="0">
                        <div class="carousel-inner">${imgsHtml}</div>
                        <button class="carousel-btn prev ${prevHidden}" onclick="event.stopPropagation();cardSlide(this,-1)">&#8249;</button>
                        <button class="carousel-btn next ${nextHidden}" onclick="event.stopPropagation();cardSlide(this,1)">&#8250;</button>
                        <div class="carousel-dots">${dotsHtml}</div>
                    </div>
                    <div class="card-body">
                        <div class="card-title">${item.title}</div>
                        <div class="card-date">${item.date}</div>
                    </div>
                `;


                card.addEventListener('click', () => openLightbox(item));
                grid.appendChild(card);
            });
        }


        /* ── CARD CAROUSEL ── */
        function cardSlide(btn, dir) {
            const carousel = btn.closest('.carousel');
            const inner = carousel.querySelector('.carousel-inner');
            const dots = carousel.querySelectorAll('.dot');
            const total = inner.children.length;
            let idx = parseInt(carousel.dataset.index) + dir;
            if (idx < 0) idx = total - 1;
            if (idx >= total) idx = 0;
            carousel.dataset.index = idx;
            inner.style.transform = `translateX(-${idx * 100}%)`;
            dots.forEach((d, i) => d.classList.toggle('active', i === idx));
        }


        function cardDot(dot, idx) {
            const carousel = dot.closest('.carousel');
            const inner = carousel.querySelector('.carousel-inner');
            const dots = carousel.querySelectorAll('.dot');
            carousel.dataset.index = idx;
            inner.style.transform = `translateX(-${idx * 100}%)`;
            dots.forEach((d, i) => d.classList.toggle('active', i === idx));
        }


        /* ── LIGHTBOX ── */
        function openLightbox(item) {
            lbImages = item.images;
            lbIndex = 0;


            document.getElementById('lbTitle').textContent = item.title;
            document.getElementById('lbDate').textContent = item.date;
            document.getElementById('lbDesc').textContent = item.description;


            const inner = document.getElementById('lbInner');
            inner.innerHTML = lbImages.map(src => `<img src="${src}" alt="">`).join('');


            renderLbDots();
            updateLb();
            document.getElementById('lightbox').classList.add('open');
            document.body.style.overflow = 'hidden';
        }


        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('open');
            document.body.style.overflow = '';
        }


        function lbSlide(dir) {
            lbIndex += dir;
            if (lbIndex < 0) lbIndex = lbImages.length - 1;
            if (lbIndex >= lbImages.length) lbIndex = 0;
            updateLb();
        }


        function updateLb() {
            document.getElementById('lbInner').style.transform = `translateX(-${lbIndex * 100}%)`;
            document.querySelectorAll('#lbDots .dot').forEach((d, i) => d.classList.toggle('active', i === lbIndex));
            document.getElementById('lbPrev').classList.toggle('hidden', lbImages.length <= 1);
            document.getElementById('lbNext').classList.toggle('hidden', lbImages.length <= 1);
        }


        function renderLbDots() {
            document.getElementById('lbDots').innerHTML = lbImages.length <= 1 ? '' : lbImages.map((_, i) =>
                `<span class="dot ${i === 0 ? 'active' : ''}" onclick="lbIndex=${i};updateLb()"></span>`
            ).join('');
        }


        /* close lightbox on backdrop click */
        document.getElementById('lightbox').addEventListener('click', function(e) {
            if (e.target === this) closeLightbox();
        });


        /* keyboard navigation */
        document.addEventListener('keydown', function(e) {
            if (!document.getElementById('lightbox').classList.contains('open')) return;
            if (e.key === 'ArrowLeft') lbSlide(-1);
            if (e.key === 'ArrowRight') lbSlide(1);
            if (e.key === 'Escape') closeLightbox();
        });


        /* init */
        renderCards();
    </script>
</body>
</html>
